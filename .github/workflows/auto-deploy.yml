name: Auto Deploy SIGE-API

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-unknown-linux-gnu
        override: true

    - name: Compilar para Linux
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Verificar existencia del binario
      run: |
        if [ ! -f target/x86_64-unknown-linux-gnu/release/sige-api ]; then
          echo "¡Binario no encontrado!"
          exit 1
        fi
        ls -lh target/x86_64-unknown-linux-gnu/release/sige-api

    - name: Instalar rsync
      run: sudo apt-get update && sudo apt-get install -y rsync

    - name: Configurar clave SSH
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
        chmod 600 key.pem

    - name: Subir binario con rsync
      run: |
        rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no -p 22" target/x86_64-unknown-linux-gnu/release/sige-api sigepol@cpnbdaet.org.ve:/home/sigepol/sige-api-linux

    - name: Asignar permisos de ejecución al binario remoto
      run: |
        ssh -i key.pem -o StrictHostKeyChecking=no -p 22 sigepol@cpnbdaet.org.ve 'chmod +x /home/sigepol/sige-api-linux'

    - name: Reiniciar servicio sige-api en el servidor remoto
      run: |
        ssh -i key.pem -o StrictHostKeyChecking=no -p 22 sigepol@cpnbdaet.org.ve 'sudo systemctl restart sige-api && sudo systemctl status sige-api --no-pager'
