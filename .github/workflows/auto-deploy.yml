name: Auto Deploy SIGE-API

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: x86_64-unknown-linux-gnu
        override: true

    - name: Compilar para Linux
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Crear settings Linux
      run: |
        cat > settings-linux.json << 'EOF'
        {
          "database": {
            "url": "postgresql://postgres:D@et2O25*@192.168.11.100:5432/sigepol"
          },
          "address": {
            "host": "192.168.11.100",
            "port": 8443
          }
        }
        EOF

    # ==== DESPLIEGUE LINUX SOLO ====
    - name: Verificar existencia del binario
      run: |
        if [ ! -f target/x86_64-unknown-linux-gnu/release/sige-api ]; then
          echo "¡Binario no encontrado!"
          exit 1
        fi
        ls -lh target/x86_64-unknown-linux-gnu/release/sige-api

    - name: Subir binario Linux a HOME remoto
      uses: appleboy/scp-action@v0.1.7
      with:
        host: cpnbdaet.org.ve
        username: sigepol
        password: S1geD@et2O25
        port: 22
        source: "target/x86_64-unknown-linux-gnu/release/sige-api"
        target: "/home/sigepol/sige-api-linux"
        debug: true

    - name: Asignar permisos de ejecución al binario remoto Linux
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: cpnbdaet.org.ve
        username: sigepol
        password: S1geD@et2O25
        port: 22
        script: chmod +x /home/sigepol/sige-api-linux

    - name: Subir configuración Linux
      uses: appleboy/scp-action@v0.1.7
      with:
        host: cpnbdaet.org.ve
        username: sigepol
        password: S1geD@et2O25
        port: 22
        source: "settings-linux.json"
        target: "/home/sigepol/settings-linux.json"
        debug: true

    - name: Actualizar servicio Linux (mover binario y config, reiniciar servicio)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: cp](#)
